<div class="container">
    <video #video (click)="stopVideo()" [ngClass]="{ 'pointer': videoPlaying }" preload="none" loop muted playsinline width="2304" height="1440" poster="/assets/images/intro.webp">
        <source src="/video/intro.webm" type="video/webm; codecs=av01.0.12M.08">
        <source src="/video/intro.mp4" type="video/mp4; codecs=avc1.42c01e">
    </video>
    @if (!videoPlaying) {
        <app-screen></app-screen>
        <app-player></app-player>
        <app-eye></app-eye>
        <button (click)="startVideo()" title="Start video"><img src="/assets/icons/movie.svg" width="24" height="24" alt="Video"></button>
    }
</div>
