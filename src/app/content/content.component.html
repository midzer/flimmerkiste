<nav>
  <button (click)="goBack()" title="Go back"><img src="/assets/icons/arrow-back.svg" width="24" height="24" alt="Arrow back"></button>
  <button (click)="share($event)" title="Share page"><img src="/assets/icons/share.svg" width="24" height="24" alt="Share"></button>
  <button (click)="toggle()" title="Toggle TOC">
    <img [src]="showToc ? '/assets/icons/table-off.svg' : '/assets/icons/table.svg'"
        width="24" height="24" alt="TOC">
  </button>
</nav>
<ul [hidden]="!showToc" class="toc"></ul>
@if (hasAudio) {
  <audio controls playsinline preload="metadata">
    <source src="{{name | mp3file}}" type="audio/mpeg">
    Your browser does not support audio element
  </audio>
}
<markdown [src]="path" (load)="onLoad()" [disableSanitizer]="true"></markdown>
@if (hasVideo) {
  <video controls playsinline preload="metadata">
    <source src="{{name | webmfile}}" type='video/webm; codecs="av01.0.12M.08, opus"'>
    <source src="{{name | mp4file}}" type='video/mp4; codecs="avc1.42c01e, mp4a.40.2"'>
    Your browser does not support video element
  </video>
}
